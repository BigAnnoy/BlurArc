<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="-12 -12 64 64" style="color: #0891b2">
  <defs>
    <linearGradient id="logoArc" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="currentColor" stop-opacity="0.95" />
      <stop offset="1" stop-color="currentColor" stop-opacity="0.65" />
    </linearGradient>
    <filter id="logoGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>
  <!-- 光晕层 -->
  <circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="3.5" fill="none" stroke-dasharray="55 33" stroke-linecap="round" transform="rotate(-30 20 20)" filter="url(#logoGlow)" opacity="0.3" />
  <!-- 主弧（渐变） -->
  <circle cx="20" cy="20" r="14" stroke="url(#logoArc)" stroke-width="2.2" fill="none" stroke-dasharray="55 33" stroke-linecap="round" transform="rotate(-30 20 20)" />
  <!-- 内弧 -->
  <circle cx="20" cy="20" r="8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-dasharray="28 22" stroke-linecap="round" transform="rotate(60 20 20)" opacity="0.75" />
  <!-- 中心点光晕 -->
  <circle cx="20" cy="20" r="2" fill="currentColor" filter="url(#logoGlow)" opacity="0.6" />
  <!-- 中心点实心 -->
  <circle cx="20" cy="20" r="1.4" fill="currentColor" />
</svg>
