<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blur Arc - PC Prototype</title>
<style>
  /* ===== CSS Variables (Light Theme) ===== */
  :root {
    --bg-page: #f0f2f5;
    --bg-card: #ffffff;
    --bg-primary-light: rgba(8, 145, 178, 0.08);
    --border: #e5e7eb;
    --text-primary: #1a2332;
    --text-secondary: #6b7280;
    --text-tertiary: #9ca3af;
    --primary: #0891b2;
    --primary-hover: #0e7490;
    --primary-light: rgba(8, 145, 178, 0.08);
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --radius-sm: 6px;
    --radius-md: 8px;
  }

  /* ===== Dark Theme ===== */
  .dark {
    --bg-page: #111827;
    --bg-card: #1a1d27;
    --bg-primary-light: rgba(34, 211, 238, 0.08);
    --border: #2a2d3a;
    --text-primary: #e8eaed;
    --text-secondary: #9ca3af;
    --text-tertiary: #6b7280;
    --primary: #22d3ee;
    --primary-hover: #06b6d4;
    --primary-light: rgba(34, 211, 238, 0.08);
    --danger: #ef4444;
    --danger-hover: #dc2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; background: var(--bg-page); color: var(--text-primary); }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-left .logo { width: 32px; height: 32px; flex-shrink: 0; }

  .header-left .title-blur {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text-primary);
  }

  .header-left .title-arc {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--primary);
  }

  .header-right {
    display: flex;
    gap: 4px;
  }

  .header-btn {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .header-btn:hover {
    background: var(--bg-page);
    color: var(--primary);
  }

  .header-btn svg { width: 16px; height: 16px; }

  /* ===== Layout ===== */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  .app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 250px;
    height: 100%;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    min-height: 0;
  }

  /* Stats Card */
  .stats-card {
    background: var(--primary-light);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 20px;
  }

  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stats-row .label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .stats-row .value {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--primary);
  }

  .stats-row + .stats-row { margin-top: 8px; }

  /* Directory Tree */
  .tree-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-tertiary);
    margin-bottom: 8px;
  }

  .year-item { margin-bottom: 4px; }

  .year-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
    width: 100%;
    text-align: left;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
  }

  .year-btn:hover { color: var(--primary); }

  .year-btn .arrow {
    font-size: 8px;
    color: var(--text-tertiary);
    transition: transform 0.15s;
    display: inline-block;
  }

  .year-btn .arrow.expanded { transform: rotate(90deg); }

  .month-list { padding-left: 14px; }

  .month-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    margin-left: -10px;
    margin-bottom: 2px;
    font-size: 13px;
    color: var(--text-secondary);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
  }

  .month-item:hover {
    background: var(--bg-page);
    color: var(--text-primary);
  }

  .month-item.selected {
    background: var(--primary);
    color: #fff;
  }

  .month-item .count {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    opacity: 0.7;
  }

  /* Folder tree */
  .folder-item {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    margin-bottom: 2px;
    font-size: 13px;
    color: var(--text-secondary);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
  }

  .folder-item:hover {
    background: var(--bg-page);
    color: var(--text-primary);
  }

  .folder-item.selected {
    background: var(--primary);
    color: #fff;
  }

  .folder-item .arrow {
    font-size: 8px;
    color: var(--text-tertiary);
    margin-right: 6px;
    transition: transform 0.15s;
    display: inline-block;
  }

  .folder-item .arrow.expanded { transform: rotate(90deg); }

  .folder-item .count {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    opacity: 0.7;
    margin-left: auto;
  }

  /* Import Button */
  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .import-btn {
    width: 100%;
    padding: 10px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .import-btn:hover { background: var(--primary-hover); }

  /* ===== Main Content ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
  }

  .toolbar-title {
    font-size: 14px;
    font-weight: 500;
  }

  .toolbar-title .name {
    color: var(--primary);
    font-weight: 600;
  }

  .toolbar-title .count {
    color: var(--text-secondary);
  }

  .toolbar-actions { display: flex; gap: 8px; }

  .toolbar-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .toolbar-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .toolbar-btn svg { width: 14px; height: 14px; }

  .toolbar-btn.danger {
    background: var(--danger);
    color: #fff;
    border-color: var(--danger);
  }

  .toolbar-btn.danger:hover { background: var(--danger-hover); }

  .toolbar-btn:disabled {
    color: var(--text-tertiary);
    cursor: not-allowed;
    border-color: var(--border);
  }

  /* Photo Grid */
  .photo-grid {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    grid-auto-rows: 180px;
    gap: 4px;
    padding: 4px;
    overflow-y: auto;
    align-content: start;
  }

  .photo-card {
    position: relative;
    border-radius: var(--radius-sm);
    overflow: hidden;
    cursor: pointer;
    background: var(--border);
  }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-card .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: #fff;
    font-size: 11px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .photo-card:hover .overlay { opacity: 1; }

  .photo-card .video-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .photo-card.selected {
    outline: 2px solid var(--primary);
    outline-offset: -2px;
  }

  .photo-card .check-icon {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 22px;
    height: 22px;
    background: var(--primary);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px;
  }

  .photo-card.selected .check-icon { display: flex; }

  /* Empty State */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
  }

  .empty-state .icon { font-size: 48px; opacity: 0.5; margin-bottom: 16px; }
  .empty-state .title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .empty-state .desc { font-size: 14px; color: var(--text-secondary); max-width: 320px; line-height: 1.6; }

  /* Loading Spinner */
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 64 64" style="color: var(--primary)">
        <defs>
          <linearGradient id="logoArc" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="currentColor" stop-opacity="0.95" />
            <stop offset="1" stop-color="currentColor" stop-opacity="0.65" />
          </linearGradient>
          <filter id="logoGlow" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur stdDeviation="2" />
          </filter>
        </defs>
        <circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="3.5" fill="none" stroke-dasharray="55 33" stroke-linecap="round" transform="rotate(-30 20 20)" filter="url(#logoGlow)" opacity="0.3" />
        <circle cx="20" cy="20" r="14" stroke="url(#logoArc)" stroke-width="2.2" fill="none" stroke-dasharray="55 33" stroke-linecap="round" transform="rotate(-30 20 20)" />
        <circle cx="20" cy="20" r="8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-dasharray="28 22" stroke-linecap="round" transform="rotate(60 20 20)" opacity="0.75" />
        <circle cx="20" cy="20" r="2" fill="currentColor" filter="url(#logoGlow)" opacity="0.6" />
        <circle cx="20" cy="20" r="1.4" fill="currentColor" />
      </svg>
      <span>
        <span class="title-blur">Blur</span><span class="title-arc"> Arc</span>
      </span>
    </div>
    <div class="header-right">
      <button class="header-btn" title="移动接入">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
          <line x1="12" y1="18" x2="12.01" y2="18" />
        </svg>
      </button>
      <button class="header-btn" title="切换主题" onclick="document.documentElement.classList.toggle('dark')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5" />
          <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
        </svg>
      </button>
      <button class="header-btn" title="设置">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 1v2m0 18v2M4.2 4.2l1.4 1.4m12.8 12.8l1.4 1.4M1 12h2m18 0h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-scroll">
        <!-- Stats Card -->
        <div class="stats-card">
          <div class="stats-row">
            <span class="label">总文件数</span>
            <span class="value">1,234</span>
          </div>
          <div class="stats-row">
            <span class="label">总大小</span>
            <span class="value">8.5 GB</span>
          </div>
        </div>

        <!-- Browse by Year -->
        <div class="tree-section-title">按年份浏览</div>
        <div class="year-item">
          <button class="year-btn">
            <span class="arrow expanded">▶</span>
            2024
          </button>
          <div class="month-list">
            <div class="month-item selected">
              <span>12月</span>
              <span class="count">156</span>
            </div>
            <div class="month-item">
              <span>11月</span>
              <span class="count">89</span>
            </div>
            <div class="month-item">
              <span>10月</span>
              <span class="count">203</span>
            </div>
            <div class="month-item">
              <span>9月</span>
              <span class="count">67</span>
            </div>
          </div>
        </div>
        <div class="year-item">
          <button class="year-btn">
            <span class="arrow">▶</span>
            2023
          </button>
        </div>

        <!-- Folders -->
        <div class="tree-section-title" style="margin-top: 16px;">文件夹</div>
        <div class="folder-item">
          <span class="arrow expanded">▶</span>
          <span>Photos</span>
          <span class="count">1,234</span>
        </div>
        <div class="folder-item" style="padding-left: 22px;">
          <span>Camera</span>
          <span class="count">890</span>
        </div>
        <div class="folder-item" style="padding-left: 22px;">
          <span>Screenshots</span>
          <span class="count">344</span>
        </div>
      </div>

      <!-- Import Button -->
      <div class="sidebar-footer">
        <button class="import-btn">导入照片</button>
      </div>
    </aside>

    <!-- Main Content -->
    <section class="main">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-title">
          <span class="name">2024年12月</span>
          <span class="count"> · 156 张照片</span>
        </div>
        <div class="toolbar-actions">
          <button class="toolbar-btn">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
            选择
          </button>
        </div>
      </div>

      <!-- Photo Grid -->
      <div class="photo-grid">
        <!-- Simulated photo cards -->
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)"></div>
          <div class="overlay">IMG_001.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)"></div>
          <div class="overlay">IMG_002.jpg</div>
          <div class="video-badge">0:32</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)"></div>
          <div class="overlay">IMG_003.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)"></div>
          <div class="overlay">IMG_004.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#fa709a 0%,#fee140 100%)"></div>
          <div class="overlay">IMG_005.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#a18cd1 0%,#fbc2eb 100%)"></div>
          <div class="overlay">IMG_006.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#fccb90 0%,#d57eeb 100%)"></div>
          <div class="overlay">IMG_007.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#e0c3fc 0%,#8ec5fc 100%)"></div>
          <div class="overlay">IMG_008.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#f5576c 0%,#ff6b6b 100%)"></div>
          <div class="overlay">IMG_009.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)"></div>
          <div class="overlay">IMG_010.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#89f7fe 0%,#66a6ff 100%)"></div>
          <div class="overlay">IMG_011.jpg</div>
        </div>
        <div class="photo-card">
          <div style="width:100%;height:100%;background:linear-gradient(135deg,#fddb92 0%,#d1fdff 100%)"></div>
          <div class="overlay">IMG_012.jpg</div>
        </div>
      </div>
    </section>
  </div>
</div>

</body>
</html>
