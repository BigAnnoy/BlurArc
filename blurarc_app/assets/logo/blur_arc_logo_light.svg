<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="-12 -12 64 64">
  <defs>
    <linearGradient id="logoArc" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891b2" stop-opacity="0.95" />
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.65" />
    </linearGradient>
    <filter id="logoGlow" x="-200%" y="-200%" width="500%" height="500%">
