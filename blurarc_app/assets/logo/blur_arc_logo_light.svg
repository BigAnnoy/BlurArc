  <circle cx="20" cy="20" r="8" stroke="#0891b2" stroke-width="1.6" fill="none" stroke-dasharray="28 22" stroke-linecap="round" transform="translate(20,20) rotate(60) translate(-20,-20)" opacity="0.75" />
  <circle cx="20" cy="20" r="2" fill="#0891b2" filter="url(#logoGlow)" opacity="0.6" />
