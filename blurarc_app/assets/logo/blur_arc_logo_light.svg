  <circle cx="20" cy="20" r="14" stroke="#0891b2" stroke-width="3.5" fill="none" stroke-dasharray="55 33" stroke-linecap="round" transform="translate(20,20) rotate(-30) translate(-20,-20)" filter="url(#logoGlow)" opacity="0.3" />
