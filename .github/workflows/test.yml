name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# 避免多个 PR 同时跑导致 runner 排队
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # 后端 Python 测试
  # --------------------------------------------------------------------------
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage.xml

  # --------------------------------------------------------------------------
  # 前端构建 + 集成测试
  # --------------------------------------------------------------------------
  frontend-build:
    name: Frontend (build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps (for test fixtures)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run API integration tests
        run: pytest test/api/ -v --no-cov

  # --------------------------------------------------------------------------
  # Flutter 移动端测试
  # --------------------------------------------------------------------------
  flutter-tests:
    name: Flutter (test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter 3.44
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44"
          channel: stable

      - name: Install dependencies
        working-directory: blurarc_app
        run: flutter pub get

      - name: Run tests with coverage
        working-directory: blurarc_app
        run: |
          flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-flutter
          path: blurarc_app/coverage/lcov.info
